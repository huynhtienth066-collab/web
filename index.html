<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio · Nguyễn Văn A</title>
    <!-- Font Awesome (icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* Reset & base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f7f3ff 0%, #e9e0fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* Card chính */
        .bio-card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.10), 0 10px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease;
            text-align: center;
        }

        .bio-card:hover {
            transform: translateY(-4px);
        }

        /* Avatar */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9f7aea, #6d4fc9);
            margin: 0 auto 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.6rem;
            font-weight: 500;
            color: white;
            box-shadow: 0 12px 28px rgba(109, 79, 201, 0.25);
            user-select: none;
            border: 3px solid rgba(255, 255, 255, 0.6);
        }

        /* Tên & chức danh */
        .name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e1a2b;
            margin-bottom: 0.25rem;
        }

        .title {
            font-size: 1rem;
            font-weight: 500;
            color: #5b4b7a;
            background: rgba(159, 122, 234, 0.15);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(159, 122, 234, 0.15);
        }

        /* Mô tả */
        .bio-text {
            font-size: 0.98rem;
            line-height: 1.6;
            color: #2d2440;
            background: rgba(255, 255, 255, 0.4);
            padding: 1rem 1.2rem;
            border-radius: 28px;
            margin-bottom: 1.8rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Các liên kết mạng xã hội */
        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #2d2440;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            flex: 0 1 auto;
        }

        .social-links a i {
            font-size: 1.1rem;
            color: #5b4b7a;
            transition: color 0.2s;
        }

        .social-links a:hover {
            background: #6d4fc9;
            border-color: #6d4fc9;
            color: white;
            transform: scale(1.03);
            box-shadow: 0 8px 18px rgba(109, 79, 201, 0.25);
        }

        .social-links a:hover i {
            color: white;
        }

        /* Nút hành động (ví dụ: email, portfolio) */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 0.4rem;
        }

        .btn-primary,
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: #6d4fc9;
            color: white;
            box-shadow: 0 8px 20px rgba(109, 79, 201, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-primary:hover {
            background: #5a3db3;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(109, 79, 201, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #2d2440;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
        }

        /* Footer nhỏ */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #7b6b98;
            letter-spacing: 0.3px;
            opacity: 0.7;
            border-top: 1px solid rgba(109, 79, 201, 0.08);
            padding-top: 1.2rem;
        }

        /* Responsive nhỏ */
        @media (max-width: 480px) {
            .bio-card {
                padding: 1.8rem 1.2rem 1.6rem;
                border-radius: 32px;
            }
            .avatar {
                width: 96px;
                height: 96px;
                font-size: 2.8rem;
            }
            .name {
                font-size: 1.6rem;
            }
            .social-links a {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
                flex: 1 1 auto;
            }
        }
    </style>
</head>
<body>

    <div class="bio-card">

        <!-- Avatar (thay chữ bằng tên hoặc icon) -->
        <div class="avatar">NA</div>

        <!-- Tên -->
        <h1 class="name">Nguyễn Văn A</h1>

        <!-- Chức danh / tagline -->
        <span class="title"><i class="fas fa-code" style="margin-right: 6px;"></i> Developer &amp; Creator</span>

        <!-- Mô tả ngắn -->
        <div class="bio-text">
            ✦ Xây dựng sản phẩm đẹp &amp; có tâm. <br />
            Thích học hỏi, chia sẻ và tạo ra giá trị.
        </div>

        <!-- Mạng xã hội -->
        <div class="social-links">
            <a href="#" aria-label="GitHub"><i class="fab fa-github"></i> GitHub</a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i> Twitter</a>
            <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i> Instagram</a>
        </div>

        <!-- Hành động chính -->
        <div class="action-buttons">
            <a href="#" class="btn-primary">
                <i class="fas fa-envelope"></i> Liên hệ
            </a>
            <a href="#" class="btn-secondary">
                <i class="fas fa-briefcase"></i> Xem dự án
            </a>
        </div>

        <!-- Footer nhỏ -->
        <div class="footer-note">
            <i class="fas fa-heart" style="color: #c084fc; margin-right: 4px;"></i>
            Làm việc với đam mê
        </div>

    </div>

</body>
</html>
